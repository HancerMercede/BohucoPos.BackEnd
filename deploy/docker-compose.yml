version: '3.8'

services:
  # Backend API (.NET) - connects to local PostgreSQL on port 5434
  api:
    build:
      context: C:/Users/HANCER MERCEDE/source/repos/BohucoPost
      dockerfile: NexusPOS.API/Dockerfile
    container_name: nexuspos-api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - nexuspos-network

  # Frontend (served by Nginx)
  frontend:
    build:
      context: C:/Users/HANCER MERCEDE/source/repos/BohucoPos-FrontEnd/NexusPOS.Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL:-http://localhost:5001}
    container_name: nexuspos-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - nexuspos-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nexuspos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - nexuspos-network

volumes:
  postgres_data:

networks:
  nexuspos-network:
    driver: bridge
