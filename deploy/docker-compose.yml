version: '3.8'

services:
  # PostgreSQL Database for Docker deployment
  nexuspos-db:
    image: postgres:16-alpine
    container_name: nexuspos-db-docker
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexuspos
      POSTGRES_PASSWORD: temppassword123
      POSTGRES_DB: nexuspos
    ports:
      - "5436:5432"
    volumes:
      - nexuspos_docker_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuspos -d nexuspos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexuspos-network

  # Backend API (.NET)
  api:
    build:
      context: ..
      dockerfile: NexusPOS.API/Dockerfile
    container_name: nexuspos-api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION:-Host=nexuspos-db;Database=nexuspos;Username=nexuspos;Password=temppassword123;Port=5432}
      Seq__Url: ${SEQ_URL:-http://nexuspos-seq:5341}
    depends_on:
      nexuspos-db:
        condition: service_healthy
    networks:
      - nexuspos-network

  # Frontend (served by Nginx)
  # NOTE: Clone both repos using 'main' branch for deployment
  frontend:
    build:
      context: ../../BohucoPos.FrontEnd
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL:-}
    container_name: nexuspos-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - nexuspos-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nexuspos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - nexuspos-network

  # Seq Logging Server
  seq:
    image: datalust/seq:latest
    container_name: nexuspos-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    networks:
      - nexuspos-network

volumes:
  nexuspos_docker_data:
  seq_data:

networks:
  nexuspos-network:
    driver: bridge
